name: Daily Healthcare Tech Digest

on:
  schedule:
    # GitHub Actions cron is UTC and does NOT observe daylight saving.
    # 15:00 UTC = 8:00 AM PDT (summer) / 7:00 AM PST (winter).
    # To pin to 8:00 AM PST year-round, change this to "0 16 * * *".
    - cron: "0 15 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Allow the job to commit the updated dedup state back to the repo.
permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python digest.py

      - name: Commit updated dedup state
        run: |
          if [[ -n "$(git status --porcelain state/seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: update digest dedup state"
            git push
          else
            echo "No state changes to commit."
          fi
